# Pinned chart version: grafana/loki 6.16.0  (single-binary deployment mode)

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  server:
    http_listen_port: 3100
    grpc_listen_port: 9095

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi   # POC: backed by kind's local-path-provisioner (ephemeral on cluster destroy)

# Disable other components in single-binary mode
backend:        { replicas: 0 }
read:           { replicas: 0 }
write:          { replicas: 0 }
chunksCache:    { enabled: false }
resultsCache:   { enabled: false }
gateway:        { enabled: false }
test:           { enabled: false }
