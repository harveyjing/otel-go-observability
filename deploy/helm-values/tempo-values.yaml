# Pinned chart version: grafana/tempo 1.10.0  (single-binary mode default)

tempo:
  retention: 6h
  reportingEnabled: false
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 10Gi
